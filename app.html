<!DOCTYPE html>
<html>
<head>
  <title>Worship Songs App</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      height: 100vh;
      margin: 0;
    }
    #left {
      width: 30%;
      border-right: 1px solid #ccc;
      padding: 10px;
      overflow-y: auto;
    }
    #right {
      width: 70%;
      padding: 10px;
    }
    .song {
      cursor: pointer;
      padding: 5px;
      border-bottom: 1px solid #eee;
    }
    .song:hover {
      background: #f0f0f0;
    }
    textarea {
      width: 100%;
      height: 200px;
    }
    input {
      width: 100%;
      margin-bottom: 5px;
      padding: 5px;
    }
    button {
      margin-top: 5px;
      padding: 5px 10px;
    }
    pre {
      white-space: pre-wrap;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div id="left">
  <input type="text" id="search" placeholder="Search..." oninput="renderSongs()" />
  <div id="songList"></div>
</div>

<div id="right">
  <h3 id="title">Select a song</h3>
  <pre id="lyrics"></pre>

  <hr>

  <h4>Add New Song</h4>
  <input type="text" id="newTitle" placeholder="Song title" />
  <textarea id="newLyrics" placeholder="Paste lyrics + chords here..."></textarea>
  <button onclick="addSong()">Save Song</button>
</div>

<script>
  let songs = JSON.parse(localStorage.getItem("songs") || "[]");

  function saveSongs() {
    localStorage.setItem("songs", JSON.stringify(songs));
  }

  function renderSongs() {
    let list = document.getElementById("songList");
    let search = document.getElementById("search").value.toLowerCase();
    list.innerHTML = "";

    songs
      .filter(s => s.title.toLowerCase().includes(search))
      .forEach((song, index) => {
        let div = document.createElement("div");
        div.className = "song";
        div.innerText = song.title;
        div.onclick = () => showSong(index);
        list.appendChild(div);
      });
  }

  function showSong(index) {
    document.getElementById("title").innerText = songs[index].title;
    document.getElementById("lyrics").innerText = songs[index].lyrics;
  }

  function addSong() {
    let title = document.getElementById("newTitle").value;
    let lyrics = document.getElementById("newLyrics").value;

    if (!title || !lyrics) {
      alert("Fill both fields!");
      return;
    }

    songs.push({ title, lyrics });
    saveSongs();
    renderSongs();

    document.getElementById("newTitle").value = "";
    document.getElementById("newLyrics").value = "";
  }

  renderSongs();
</script>

</body>
</html>
