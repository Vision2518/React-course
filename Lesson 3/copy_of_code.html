<!doctype html>

  <body>

    <script type="text/babel">
      function ChatInput() {
        //CamelCase always
        return (
          <>
            {/*fragments*/}
            <input placeholder="Send a message to Chatbot" size="30" />
            <button>Send</button>
          </>
        );
      }
      function ChatMessage({ message, sender }) {
        //const message=props.message;
        //const sender=props.sender;
        //const {message,sender}=props;//destructuring or deconstructing
        /*if(sender==='robot'){
                    return (
                        <div>
                            <img src="robot.png" width="50" />
                            {message}
                        </div>
                    )
                }*/
        return (
          <div>
            {/*guard operator*/}
            {sender === "robot" && <img src="robot.png" width="50" />}
            {message}
            {sender === "user" && <img src="user.png" width="50" />}
          </div>
        );
      }
      function ChatMessages() {
       const array= React.useState(
        [
          {
            message: "hello chatbot",
            sender: "user",
            id: "id1",
          },
          {
            message: "Hello, how can i help you?",
            sender: "robot",
            id: "id2",
          },
          {
            message: "Can you get me Todays Date?",
            sender: "user",
            id: "id3",
          },
          {
            message: "sure,today is march 24",
            sender: "robot",
            id: "id4",
          },
        ]
        )
        const chatMessages = array[0];
        const setchatMessages=array[1];
          
       function sendMessage(){
        setchatMessages([
          ...chatMessages,
          {
            message:'test',
            sender:'user',
            key:crypto.randomUUID
          },
        ])
       }
        function sendMessagea(){
        setchatMessages([
          ...chatMessages,
          {
            message:'testback',
            sender:'robot',
            key:crypto.randomUUID
          }

        ])
       }
        return (
          <>
            <button onClick={sendMessage}>send message</button>
            <button onClick={sendMessagea}>send your message</button>
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
          </>
        );
      }

      function App() {
        return (
          <>
            {/*{ChatInput()} // old way*/}
            <ChatInput />
            <ChatMessages />
          </>
        );
      }
      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
